name: appsonair_flutter_appremark_example
description: "Demonstrates how to use the appsonair_flutter_appremark plugin."
version: 0.0.1


publish_to: 'none' 

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  appsonair_flutter_appremark:

    path: ../

  cupertino_icons: ^1.0.6

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  config:
    # Set to false  → always uses CocoaPods (default, for contributors & CI)
    # Set to true   → uses SPM (or remove this key and enable globally via
    #                 `flutter config --enable-swift-package-manager`)
    enable-swift-package-manager: true

  uses-material-design: true


