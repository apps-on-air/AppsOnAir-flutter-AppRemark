name: appsonair_flutter_appremark_example
description: "Demonstrates how to use the appsonair_flutter_appremark plugin."
version: 0.0.1


publish_to: 'none' 

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  appsonair_flutter_appremark:

    path: ../

  cupertino_icons: ^1.0.6

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  # config: holds project-level Flutter feature flags that override global
  # `flutter config` settings. Options set here apply only to this project.
  # config:
    # ─── Swift Package Manager (SPM) Toggle ───────────────────────────────────
    #
    # GLOBAL LEVEL  (applies to all Flutter projects on your machine)
    # ──────────────────────────────────────────────────────────────
    #   Enable  → flutter config --enable-swift-package-manager
    #   Disable → flutter config --no-enable-swift-package-manager
    #   Check   → flutter config
    #
    # PROJECT LEVEL  (overrides the global setting for this project only)
    # ──────────────────────────────────────────────────────────────────
    #   Enable  → uncomment the line below and set it to: true
    #   Disable → uncomment the line below and set it to: false
    #             (this also overrides a globally enabled SPM setting)
    #   Default → keep the line commented out to inherit the global setting
    #
    # ─────────────────────────────────────────────────────────────────────────
    #  enable-swift-package-manager: true

  uses-material-design: true


